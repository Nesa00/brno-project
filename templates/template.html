<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Bezpečná křižovatka</title>
		<style>
			body { font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Liberation Sans', sans-serif; background: #f8f8f8; color: #222; margin: auto; padding: 2em; max-width: 794px;}
		.site-nav {
			margin: 0 auto 1rem auto;
			padding: 0.9rem 1.2rem;
			background: #fff;
			box-shadow: 0 2px 16px rgba(0,0,0,0.08);
			border-radius: 8px;
			display: flex;
			gap: 0.75rem;
			flex-wrap: wrap;
		}
		.site-nav a {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			padding: 0.45rem 0.8rem;
			border-radius: 999px;
			background: #eef5ff;
			color: #1f4f82;
		}
		.site-nav a:hover {
			background: #dcecff;
			text-decoration: none;
		}
		.markdown-body {
			background: #fff;
			margin: 2em auto;
			padding: 2em 2.5em;
			box-shadow: 0 2px 16px rgba(0,0,0,0.08);
			border-radius: 8px;
		}
		h1, h2, h3, h4, h5, h6 { color: #2c3e50; }
		pre, code { background: #f4f4f4; border-radius: 4px; padding: 2px 6px; font-size: 1em; }
		pre { padding: 1em; overflow-x: auto; }
		blockquote { border-left: 4px solid #b4b4b4; margin: 1em 0; padding: 0.5em 1em; color: #555; background: #fafafa; }
		table {
			border-collapse: collapse;
			width: 100%;
			overflow-x: auto;
			max-width: 100%;
			margin: auto;
		}
		th, td {
			border: 1px solid #ddd;
			padding: 0.5em 1em;
			box-sizing: border-box;
			word-break: break-word;
		}
		th { background: #eee; }
		iframe {
			max-width: 100%;
			width: 100%;
			display: block;
		}
		a { 
			color: #007acc; 
			text-decoration: none; 
		}
		a:hover { 
			text-decoration: underline; 
		}
		ul, ol { 
			margin: 1em 0 1em 2em; 
		}
		img {
			max-width: 100%;
			height: auto;
		}
		.markdown-body img {
			cursor: zoom-in;
			transition: transform 0.2s ease, box-shadow 0.2s ease;
		}
		.markdown-body img:hover {
			transform: scale(1.02);
			box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
		}
		.image-lightbox {
			position: fixed;
			inset: 0;
			display: none;
			align-items: center;
			justify-content: center;
			padding: 2rem;
			background: rgba(0, 0, 0, 0.88);
			z-index: 9999;
			cursor: zoom-out;
		}
		.image-lightbox.is-open {
			display: flex;
		}
		.image-lightbox img {
			max-width: min(95vw, 1600px);
			max-height: 92vh;
			width: auto;
			height: auto;
			box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
		}
		.image-lightbox__hint {
			position: absolute;
			right: 1.25rem;
			bottom: 1rem;
			color: #f5f5f5;
			font-size: 0.95rem;
			letter-spacing: 0.02em;
		}
		@media print {
			body { background: #fff !important; padding: 0; }
			.markdown-body {
				box-shadow: none !important;
				border-radius: 0 !important;
				margin: 0 auto !important;
				padding: 0.5in 0.7in !important;
				max-width: 100% !important;
				width: 210mm !important;
				min-height: 297mm !important;
			}
			@page {
				size: A4;
				margin: 0;
			}
		}
	</style>
</head>
<body>
	<nav class="site-nav">
		<a href="project.html">Project</a>
		<a href="readme.html">Readme</a>
		<a href="notes.html">Notes</a>
	</nav>
	<div class="markdown-body">
		{{ content }}
	</div>
	<div class="image-lightbox" id="image-lightbox" aria-hidden="true">
		<img id="lightbox-image" alt="">
		<div class="image-lightbox__hint">Click anywhere or press Esc to close</div>
	</div>
	<script>
		document.addEventListener('DOMContentLoaded', function () {
			const lightbox = document.getElementById('image-lightbox');
			const lightboxImage = document.getElementById('lightbox-image');
			const contentImages = document.querySelectorAll('.markdown-body img');

			function closeLightbox() {
				lightbox.classList.remove('is-open');
				lightbox.setAttribute('aria-hidden', 'true');
				lightboxImage.removeAttribute('src');
				lightboxImage.alt = '';
				document.body.style.overflow = '';
			}

			contentImages.forEach(function (image) {
				image.addEventListener('click', function () {
					lightboxImage.src = image.currentSrc || image.src;
					lightboxImage.alt = image.alt || '';
					lightbox.classList.add('is-open');
					lightbox.setAttribute('aria-hidden', 'false');
					document.body.style.overflow = 'hidden';
				});
			});

			lightbox.addEventListener('click', closeLightbox);
			document.addEventListener('keydown', function (event) {
				if (event.key === 'Escape' && lightbox.classList.contains('is-open')) {
					closeLightbox();
				}
			});
		});
	</script>
</body>
</html>
